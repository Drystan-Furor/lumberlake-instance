<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<th:block th:fragment="refer-home">
    <section
            id="refer-home"
            class="gradient">
        <th:block th:insert="~{fragments/elements/waves/top.html :: top-wave-svg}"></th:block>
        <div class="container mx-auto px-6 text-center py-20">
            <!-- LOGO -->
            <div>
                <section
                        class="max-w-4xl mx-auto flex justify-between items-center mb-3"
                >
                    <img
                            alt="Lumberlake logo met drie Jack Russell Terriërs en tekst 'Lumberlake Jack Russell Terrier' op witte achtergrond"
                            class="sm:w-1/2 mx-auto rounded-full"
                            src="/img/logo/logo.avif"/>
                </section>
            </div>
            <h2 class="mb-6 text-4xl font-bold text-center text-white">
                Welkom bij <br/> Lumberlake
            </h2>
            <h3 class="my-4 text-2xl text-white">Lumberlake is een kleinschalige kennel gespecialiseerd in raszuivere Jack
                Russell Terriërs!</h3>
            <p class="mb-3 text-white">
                Energieke, vrije en zeer sociale honden met een eerlijk karakter.
            </p>
            <a href="/">
                <button
                        class="bg-white text-black font-bold rounded-full py-4 px-8 shadow-lg uppercase tracking-wider m-4"
                >
                    Bezoek ons
                </button>
            </a>
            <a href="https://www.facebook.com/lumberlake.jackrussells">
                <button
                        class="bg-blue-400 text-white font-bold rounded-full py-4 px-8 shadow-lg uppercase tracking-wider m-4"
                >
                    <i class="fab fa-facebook"></i>facebook
                </button>
            </a>
        </div>

        <th:block th:insert="~{fragments/elements/waves/bottom.html :: bottom-wave-svg}"></th:block>

    </section>


</th:block>
</html>
