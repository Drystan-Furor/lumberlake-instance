<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<th:block th:fragment="content">

    <div class="flex items-center flex-wrap mb-20">
        <div class="w-full md:w-1/2 px-8 min-h-[80vh]">
            <div class="text-3xl text-gray-800 dark:text-slate-50 font-bold mb-3">
                Emma
            </div>
            <div class="text-2xl text-gray-800 dark:text-slate-50 font-bold mb-3">
                LumberLake Beyond the Ordinary 02.04.2014
            </div>
            <p class="italic text-gray-600 dark:text-slate-300 mb-8">
                ECVO vrij
                | Patella %
                | PLL normaal door DNA
                | Levershunt vrij
            </p>
            <div id="stats" class=" m-8">
                <div class="Gold flex flex-col items-center mx-auto w-72 md:w-72 h-auto pt-5 pb-7 border border-gray-200 rounded-lg space-y-8 shadow-lg">
                    <div class="flex flex-col text-center space-y-1">
                        <h2 class="text-2xl font-bold tracking-tight text-gray-900">
                            Emma's Prestaties
                        </h2>
                        <p class="text-slate-800 text-sm">
                            LumberLake Beyond the Ordinary
                        </p>
                        <div class="space-y-2">
                            <div class="flex gap-2" th:each="achievement : ${emmaProfile.achievements}">
                                <i class="w-5 h-5 text-yellow-300 dark:text-yellow-300 fas fa-star"></i>
                                <span class="text-slate-800 text-sm" th:text="${achievement}">VP 2x ’14</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="w-full mx-auto sm:w-1/2 m-4 shadow-2xl">
            <img loading="lazy" width="1200" height="800"
                 alt="Emma - LumberLake Beyond the Ordinary Jack Russell teefje van Lumberlake kennel"
                 class="rounded-lg border-2 border-yellow-600 sm:max-w-full sm:h-auto "
                 src="./img/dogs/emma-stand.avif">
            <span class="text-center text-neutral-900 dark:text-neutral-100 text-xs">Emma - LumberLake Beyond the Ordinary</span>
        </div>
        <script type="application/ld+json" th:inline="javascript">
            {
                "@context": "https://schema.org",
                "@type": "IndividualAnimal",
                "name": "Emma - LumberLake Beyond the Ordinary",
                "alternateName": "LumberLake Beyond the Ordinary",
                "description": "Emma is een raszuivere Jack Russell teef met een eerlijk karakter, geboren op 02-04-2014. Gezond verklaard (ECVO vrij, Patella %, PLL normaal door DNA, Levershunt vrij).",
                "image": "https://lumberlake.nl/img/dogs/emma-stand.avif",
                "gender": "Female",
                "breed": "Jack Russell Terrier",
                "birthDate": "2014-04-02",
                "url": "https://lumberlake.nl/#emma-dame",
                "identifier": "emma-beyond-the-ordinary",
                "award": /*[[${emmaProfile.achievements}]]*/ [],
                "healthCondition": [
                    "ECVO vrij",
                    "Patella %",
                    "PLL normaal door DNA",
                    "Levershunt vrij"
                ],
                "parentOrganization": {
                    "@type": "LocalBusiness",
                    "name": "Lumberlake Jack Russell Kennel",
                    "url": "https://lumberlake.nl",
                    "image": "https://lumberlake.onrender.com/img/logo/logo/logo-small.avif",
                    "telephone": "+31 6 3402 4746",
                    "address": {
                        "@type": "PostalAddress",
                        "streetAddress": "Manresastraat 8",
                        "postalCode": "5915VK",
                        "addressLocality": "Venlo",
                        "addressCountry": "NL"
                    }
                }
            }
        </script>
    </div>

</th:block>
</html>
