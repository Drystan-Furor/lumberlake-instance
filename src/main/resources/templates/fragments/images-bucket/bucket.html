<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<th:block th:fragment="bucket">
    <section class="bg-gray-300 dark:bg-slate-800 dark:text-white gradient min-h-[50vh]"
             id="image-bucket">
        <h2 class="sr-only">foto bucket</h2>

        <th:block th:insert="~{fragments/elements/waves/top.html :: top-wave-svg}"></th:block>

        <div class="container-bucket mx-auto px-6 mt-16" id="fotoboek">
            <h3 class="text-4xl font-bold text-center text-white">
                Fotoboek
            </h3>
            <h4 class="text-white text-base px-6 text-center">
                Een verzameling van onze favoriete momenten
            </h4>
            <div class="bucket min-h-[600px]" id="bucket-items">
                <th:block th:replace="~{fragments/images-bucket/bucket :: bucket-items(items=${bucketPage.items})}"></th:block>
            </div>
            <th:block th:replace="~{fragments/images-bucket/bucket :: bucket-pagination(bucketPage=${bucketPage}, oob=${false})}"></th:block>
        </div>
    </section>
</th:block>

<th:block th:fragment="bucket-items(items)">
    <article th:each="image : ${items}" class="w-full max-w-4xl mx-auto mb-10">
        <img class="w-full h-auto rounded-lg shadow-2xl"
             decoding="async"
             loading="lazy"
             th:alt="${image.alt}"
             th:src="${image.url}">
    </article>
</th:block>

<div id="bucket-pagination"
     th:fragment="bucket-pagination(bucketPage, oob)"
     th:attr="hx-swap-oob=${oob} ? 'outerHTML' : null">
    <div class="mt-10 flex flex-col items-center gap-4">
        <a th:if="${bucketPage.hasMore}"
           aria-controls="bucket-items"
           class="inline-flex items-center justify-center rounded-full border border-white/60 px-6 py-3 font-semibold text-white transition hover:bg-white hover:text-slate-900 focus:outline-none focus:ring-2 focus:ring-white"
           th:attr="hx-get=@{/bucket/page(cursor=${bucketPage.nextCursor})},hx-target='#bucket-items',hx-swap='beforeend',hx-trigger='revealed once, click',hx-disabled-elt='this'"
           th:href="|/?bucketVisibleCount=${bucketPage.nextVisibleCount}#image-bucket|">
            Meer foto's laden
        </a>
        <p class="text-center text-sm text-white/80"
           th:if="${bucketPage.isEmpty()}">
            Er zijn nog geen foto's beschikbaar.
        </p>
        <p class="text-center text-sm text-white/80"
           th:if="${!bucketPage.hasMore() and !bucketPage.isEmpty()}">
            Einde van het fotoboek.
        </p>
    </div>
</div>

<th:block th:fragment="bucket-page">
    <th:block th:replace="~{fragments/images-bucket/bucket :: bucket-items(items=${bucketPage.items})}"></th:block>
    <th:block th:replace="~{fragments/images-bucket/bucket :: bucket-pagination(bucketPage=${bucketPage}, oob=${true})}"></th:block>
</th:block>
</html>
