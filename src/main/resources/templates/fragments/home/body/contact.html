<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<th:block th:fragment="contact">
    <section id="contact"
             class="gradient min-h-[50vh]">
        <h2 class="sr-only">Contact</h2>
        <th:block th:insert="~{fragments/elements/waves/top.html :: top-wave-svg}"></th:block>
        <div class="container mx-auto px-6 text-center py-20 min-h-[80vh]">
            <div class="mb-6 text-4xl font-bold text-center text-white">
                Ben je klaar om je leven te verrijken met een Jack Russell pup van Lumberlake?
            </div>
            <div class="my-4 text-2xl text-white">
                Neem contact met ons op<br>
                en ontdek jouw nieuwe beste vriend!
            </div>
            <div class="container mx-auto px-6 py-20" id="contact-card">
                <h3 class="text-4xl font-bold text-center text-white dark:text-slate-50 mb-8">
                    Contact
                </h3>
                <div class="flex flex-wrap">
                    <div class="w-full px-2 mb-4">
                        <div class="bg-white w-full sm:w-2/3 md:w-1/2 mx-auto rounded shadow py-4 px-4">
                            <div class="text-black text-center">Afspraak maken:</div>
                            <p class="text-gray-800 text-base px-6 mb-5">
                                Telefonisch: <a class="hover:opacity-90"
                                                href="tel:+31634024746"
                                                aria-label="Bel ons op 06 34 02 47 46">
                                (+31) 6 3402 4746</a><br>
                                E-mail:
                                <a class="hover:opacity-90"
                                   href="mailto:gerdaarts@gmail.com"
                                   aria-label="Stuur een e-mail naar gerdaarts@gmail.com">
                                    Stuur een e-mail </a><br>
                                <a class="hover:opacity-90 inline-flex items-center justify-center"
                                   href="https://www.facebook.com/lumberlake.jackrussells"
                                   aria-label="Facebook">
                                    <svg class="w-6 h-6" viewBox="0 0 512 512">
                                        <circle cx="256" cy="256" r="256" fill="#1877F2"/>
                                        <path d="M334 176h-42c-11 0-22 9-22 20v40h60l-10 60h-50v160h-60V296h-50v-60h50v-50c0-44 36-80 80-80h44v70z"
                                              fill="white"/>
                                    </svg>
                                </a>
                            </p>
                            <p class="text-gray-500 text-xs md:text-sm px-6">
                                Overdag goed bereikbaar.
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <th:block th:insert="~{fragments/elements/waves/bottom.html :: bottom-wave-svg}"></th:block>
    </section>

</th:block>
</html>
