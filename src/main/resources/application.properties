spring.application.name=lumberlake
logging.level.sun.rmi.transport.tcp=ERROR
bucket.batch-size=12
bucket.resource-pattern=classpath*:static/img/photobook/*
bucket.public-path=/img/photobook/
bucket.alt-text=Jack Russell Terrier van Lumberlake kennel
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json,application/xml,image/svg+xml
server.compression.min-response-size=1024
